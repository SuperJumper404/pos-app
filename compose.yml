services:
  pos-app:
    container_name: ${CONTAINER_NAME:-frontend_smart_eat}
    image: node:18-bullseye-slim
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:${PORT:-3000}"
    environment:
      ENV: ${ENV:-production}
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
    volumes:
      - ./:/app
      - pos_app_node_modules:/app/node_modules
    command: >
      sh -c "npm ci
      && npm run generate
      && node serve-dist-folder.js"

volumes:
  pos_app_node_modules:
