services:
  pos-app:
    container_name: ${CONTAINER_NAME:-frontend_smart_eat}
    image: node:18-bullseye-slim
    user: "${UID}:${GID}"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:${PORT:-3000}"
    environment:
      ENV: ${ENV:-production}
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/.npm
    volumes:
      - ./:/app
      - pos_app_node_modules:/app/node_modules
    command: >
      sh -c "node serve-dist-folder.js"

volumes:
  pos_app_node_modules:
