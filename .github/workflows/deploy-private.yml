name: Deploy Frontend to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: smarteat-runner

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.179
          username: webserversmarteat
          password: root
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/webserversmarteat/smarteat/frontend
            APP_NAME=smarteat-staging
            BRANCH=staging
            REPO_URL=https://github.com/SuperJumper404/pos-app.git
            SERVE_PORT=3000

            rm -rf "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"

            cd "$APP_DIR"

            cat > .env << 'EOF'
            VUE_APP_BASEURL=https://staging.smarteat.fr:5005
            ENV=staging
            privateURL=staging.smarteat.fr
            EOF

            npm install
            npm run generate

            pm2 startOrRestart ecosystem.config.js --env staging
            pm2 save