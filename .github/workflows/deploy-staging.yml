name: Deploy Frontend to Staging

on:
  # push:
  #   branches:
  #     - staging

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode de déploiement'
        required: true
        type: choice
        options:
          - compose
          - pm2

jobs:
  deploy-compose:
    if: ${{ github.event_name == 'push' || inputs.mode == 'compose' }}
    runs-on: smarteat-runner

    steps:
      - name: Deploy on server with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.99
          username: vscodeserver
          password: roottoorroot
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/vscodeserver/smarteat/frontend
            BRANCH=staging
            REPO_URL=https://github.com/SuperJumper404/pos-app.git
            COMPOSE_FILE=compose.yml

            rm -rf "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"

            cd "$APP_DIR"

            cat > .env.staging <<EOF
            ENV=staging
            NODE_ENV=staging
            APP_PORT=3000
            PORT=3000
            HOST=0.0.0.0
            CONTAINER_NAME=frontend_smart_eat_staging
            EOF

            export UID=$(id -u)
            export GID=$(id -g)

            npm ci
            npm run generate

            docker compose --env-file .env.staging -f "$COMPOSE_FILE" down --remove-orphans || true
            docker compose --env-file .env.staging -f "$COMPOSE_FILE" up -d --force-recreate

            docker compose --env-file .env.staging -f "$COMPOSE_FILE" ps

  deploy-pm2:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'pm2' }}
    runs-on: smarteat-runner

    steps:
      - name: Deploy on server with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.1.179
          username: webserversmarteat
          password: root
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/webserversmarteat/smarteat/frontend
            APP_NAME=frontend_smart_eat_staging
            BRANCH=staging
            REPO_URL=https://github.com/SuperJumper404/pos-app.git

            rm -rf "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"

            cd "$APP_DIR"

            npm install

            export ENV=staging
            npm run generate

            pm2 delete "$APP_NAME" || true
            pm2 start ecosystem.config.js --env staging --name "$APP_NAME"
            pm2 save
