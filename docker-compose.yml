services:
  pos-app:
    container_name: ${CONTAINER_NAME:-frontend_smart_eat_staging}
    image: node:18-bullseye-slim
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      ENV: ${BUILD_ENV:-staging}
      NODE_ENV: ${NODE_ENV:-staging}
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - ./:/app
      - pos_app_node_modules:/app/node_modules
    command: >
      sh -c "npm ci
      && npm run generate
      && node serve-dist-folder.js"

volumes:
  pos_app_node_modules:
